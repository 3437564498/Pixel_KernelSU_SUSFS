name: Setup SukiSU Ultra
description: Download and configure SukiSU Ultra with version tracking
inputs:
  ksu_commit:
    description: "SukiSU Ultra commit or tag (empty = latest tag)"
    required: false
    type: string

runs:
  using: composite
  steps:
    - name: Download SukiSU Ultra
      shell: bash
      working-directory: ${{ github.workspace }}/kernel/aosp
      run: |
        # SukiSU's susfs Kconfig symbols live ONLY on the 'builtin' branch. We MUST be on
        # that branch, so clone it explicitly rather than relying on setup.sh's checkout,
        # which falls back to the default branch if a commit/ref isn't in a shallow clone
        # (that's why the previous run ended up on main with no KSU_SUSFS Kconfig).
        # ksu_commit is intentionally ignored: susfs support is branch-specific.
        rm -rf KernelSU
        git clone --depth=1 -b builtin https://github.com/SukiSU-Ultra/SukiSU-Ultra.git KernelSU
        echo "SukiSU branch:"; git -C KernelSU rev-parse --abbrev-ref HEAD; git -C KernelSU log -1 --oneline
        echo "KSU_SUSFS symbol count in Kconfig:"; grep -c "KSU_SUSFS" KernelSU/kernel/Kconfig || true
        # Do NOT run setup.sh: with no arg it does `git checkout <latest-tag>`, which would
        # switch away from the builtin branch (losing the KSU_SUSFS Kconfig), and `git pull`
        # can fail on a shallow clone. Instead replicate exactly what setup.sh wires up:
        #   1) symlink drivers/kernelsu -> KernelSU/kernel
        #   2) obj-$(CONFIG_KSU) += kernelsu/  in drivers/Makefile
        #   3) source "drivers/kernelsu/Kconfig" in drivers/Kconfig
        ln -sf "$(realpath --relative-to=drivers KernelSU/kernel)" drivers/kernelsu
        grep -q "kernelsu" drivers/Makefile || printf '\nobj-$(CONFIG_KSU) += kernelsu/\n' >> drivers/Makefile
        grep -q 'source "drivers/kernelsu/Kconfig"' drivers/Kconfig || \
          sed -i '/^endmenu/i source "drivers/kernelsu/Kconfig"' drivers/Kconfig
        echo "Wired kernelsu into drivers/{Makefile,Kconfig}."


    - name: Enable KernelSU Config
      shell: bash
      working-directory: ${{ github.workspace }}
      run: |
        cat >> "${{ github.workspace }}/wild_gki.fragment" << 'EOF'
        # SukiSU Ultra Configuration
        CONFIG_KSU=y
        # KPM (Kernel Patch Module) support
        CONFIG_KPM=y
        EOF
    
    - name: Extract KSU Version Info
      id: ksu-version
      shell: bash
      working-directory: ${{ github.workspace }}/kernel/aosp/KernelSU
      run: |
        # Extract and export SukiSU Ultra version info (display/logging only)
        KSU_GIT_VERSION=$(git rev-list --count HEAD 2>/dev/null)
        KSU_GIT_TAG=$(git describe --tags --abbrev=0 2>/dev/null)
        KSU_COMMIT=$(git rev-parse --short HEAD 2>/dev/null)
        KSU_VERSION=$((10000 + KSU_GIT_VERSION))

        echo "KSU_GIT_TAG=$KSU_GIT_TAG" >> $GITHUB_ENV
        echo "KSU_VERSION=$KSU_VERSION" >> $GITHUB_ENV
        echo "KSU_COMMIT=$KSU_COMMIT" >> $GITHUB_ENV
